<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(10,10,10,0.06)" stroke-width="0.5"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#f7f6f2"/>
  
  <!-- Right panel -->
  <rect x="820" y="0" width="380" height="630" fill="#ece9e1"/>
  <rect x="820" y="0" width="380" height="630" fill="url(#grid)"/>
  
  <!-- Left content -->
  <!-- Eyebrow -->
  <text x="80" y="140" font-family="Georgia,serif" font-size="13" fill="#999" letter-spacing="3">DIGITAL PROJECT MANAGER · SWEDEN</text>
  
  <!-- Name -->
  <text x="80" y="240" font-family="Georgia,serif" font-size="86" fill="#0a0a0a" font-weight="400">Abhinav</text>
  <text x="80" y="330" font-family="Georgia,serif" font-size="86" fill="#666" font-style="italic" font-weight="400">Ram Kola</text>
  
  <!-- Gold rule -->
  <rect x="80" y="360" width="48" height="2" fill="#c9a96e"/>
  
  <!-- Tagline line 1 -->
  <text x="80" y="400" font-family="Georgia,serif" font-size="15" fill="#666" font-weight="300">I don't just deliver projects. I leave behind systems</text>
  <text x="80" y="422" font-family="Georgia,serif" font-size="15" fill="#666" font-weight="300">that outlast me, users who actually adopt them, and</text>
  <text x="80" y="444" font-family="Georgia,serif" font-size="15" fill="#666" font-weight="300">processes that no longer need babysitting.</text>
  
  <!-- URL -->
  <text x="80" y="510" font-family="monospace" font-size="12" fill="#aaa" letter-spacing="1">abhinavramkola.github.io/Profile</text>

  <!-- Stats right panel -->
  <!-- 260+ -->
  <text x="1150" y="160" font-family="Georgia,serif" font-size="64" fill="#0a0a0a" text-anchor="end" font-weight="400">260</text>
  <text x="1170" y="160" font-family="Georgia,serif" font-size="40" fill="#c9a96e" text-anchor="end" font-weight="400">+</text>
  <text x="1170" y="182" font-family="Arial,sans-serif" font-size="11" fill="#999" text-anchor="end" letter-spacing="2">HOURS SAVED / WEEK</text>
  
  <!-- 9k+ -->
  <text x="1150" y="310" font-family="Georgia,serif" font-size="64" fill="#0a0a0a" text-anchor="end" font-weight="400">9</text>
  <text x="1170" y="310" font-family="Georgia,serif" font-size="40" fill="#c9a96e" text-anchor="end" font-weight="400">k+</text>
  <text x="1170" y="332" font-family="Arial,sans-serif" font-size="11" fill="#999" text-anchor="end" letter-spacing="2">SUPPLIERS CENTRALISED</text>
  
  <!-- 60+ -->
  <text x="1150" y="460" font-family="Georgia,serif" font-size="64" fill="#0a0a0a" text-anchor="end" font-weight="400">60</text>
  <text x="1170" y="460" font-family="Georgia,serif" font-size="40" fill="#c9a96e" text-anchor="end" font-weight="400">+</text>
  <text x="1170" y="482" font-family="Arial,sans-serif" font-size="11" fill="#999" text-anchor="end" letter-spacing="2">COMPANIES IMPACTED</text>
  
  <!-- Vertical divider line -->
  <line x1="820" y1="60" x2="820" y2="570" stroke="#ddd" stroke-width="0.5"/>
</svg>